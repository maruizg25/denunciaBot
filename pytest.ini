[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest-asyncio en modo "strict" — cada test async se marca explícitamente
# con @pytest.mark.asyncio. Más predecible que el modo "auto".
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

# Salida menos verbosa por defecto. Usar `pytest -v` para detalle.
addopts =
    --strict-markers
    --tb=short
    -ra

markers =
    slow: tests lentos (>1s)
    integration: requieren BD/Redis reales
