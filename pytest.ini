[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest-asyncio en modo "auto" — las fixtures async definidas con
# @pytest.fixture se awaitean automáticamente. Coincide con la suposición
# del conftest.py y evita migrar todas las fixtures a @pytest_asyncio.fixture.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Por defecto EXCLUIMOS los tests de integración (requieren docker compose up).
# Para correrlos: `pytest -m integration` o `make test-integration`.
addopts =
    --strict-markers
    --tb=short
    -ra
    -m "not integration"

markers =
    slow: tests lentos (>1s)
    integration: requieren BD y Redis reales (correr con `make up` primero)
