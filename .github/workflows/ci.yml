# =============================================================================
# DenunciaBot — Integración Continua
# -----------------------------------------------------------------------------
# Dos jobs:
#   - `unit`: rápido (sin servicios externos), corre en cada push y PR.
#   - `integration`: lento (levanta postgres + redis), corre en PR y main.
#
# Cuando lleguen errores, mira el "Summary" del run en la pestaña Actions
# del repo en GitHub.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # permite disparar el workflow manualmente

# Cancela ejecuciones previas si llega un nuevo push a la misma rama
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------
  # Tests unitarios — rápidos, sin BD/Redis. Corren siempre.
  # ----------------------------------------------------------------------
  unit:
    name: Tests unitarios (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev gcc

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Provisionar variables de entorno para tests
        run: |
          # Estos valores son DUMMY, suficientes para que pydantic-settings valide.
          # Los secretos reales NUNCA viven en GitHub Actions.
          cat > .env <<EOF
          APP_ENV=development
          APP_DEBUG=false
          LOG_FORMAT=console
          DENUNCIABOT_MASTER_KEY=cdvWmqdEQH1pPRJB8wEszEHTNH4-OzwUe6cqMRRWS7s=
          DENUNCIABOT_PHONE_PEPPER=pepper-ci-test-1234567890abcdef
          DATABASE_URL=postgresql+asyncpg://denunciabot:test@localhost:5432/denunciabot
          REDIS_URL=redis://localhost:6379/15
          META_PHONE_NUMBER_ID=123456789
          META_ACCESS_TOKEN=test-access-token
          META_APP_SECRET=test-app-secret
          META_VERIFY_TOKEN=test-verify-token
          SMTP_HOST=localhost
          SMTP_FROM=denunciabot@ci.local
          SMTP_TO=destino@ci.local
          EVIDENCIAS_DIR=/tmp/denunciabot_ci_evidencias
          CLAMAV_ENABLED=false
          EOF

      - name: Correr tests unitarios
        run: pytest --cov=app --cov-report=xml --cov-report=term

      - name: Subir reporte de cobertura
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  # ----------------------------------------------------------------------
  # Tests de integración — levantan postgres y redis como services.
  # ----------------------------------------------------------------------
  integration:
    name: Tests de integración (Python 3.11)
    runs-on: ubuntu-latest
    needs: unit  # solo correr si los unitarios pasaron

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: denunciabot
          POSTGRES_PASSWORD: test
          POSTGRES_DB: denunciabot
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U denunciabot -d denunciabot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev gcc

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Provisionar .env
        run: |
          cat > .env <<EOF
          APP_ENV=development
          DENUNCIABOT_MASTER_KEY=cdvWmqdEQH1pPRJB8wEszEHTNH4-OzwUe6cqMRRWS7s=
          DENUNCIABOT_PHONE_PEPPER=pepper-ci-test-1234567890abcdef
          DATABASE_URL=postgresql+asyncpg://denunciabot:test@localhost:5432/denunciabot
          REDIS_URL=redis://localhost:6379/15
          META_PHONE_NUMBER_ID=123456789
          META_ACCESS_TOKEN=test-access-token
          META_APP_SECRET=test-app-secret
          META_VERIFY_TOKEN=test-verify-token
          SMTP_HOST=localhost
          SMTP_FROM=denunciabot@ci.local
          SMTP_TO=destino@ci.local
          EVIDENCIAS_DIR=/tmp/denunciabot_ci_evidencias
          CLAMAV_ENABLED=false
          LOG_FORMAT=console
          EOF

      - name: Aplicar migraciones
        run: alembic upgrade head

      - name: Verificar triggers de seguridad
        run: python scripts/init_db.py

      - name: Correr tests de integración
        run: pytest -m integration --override-ini="addopts=--strict-markers --tb=short -ra"

  # ----------------------------------------------------------------------
  # Lint (no-bloqueante) — solo informa, no falla el build.
  # ----------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: true  # no rompe el CI; es solo informativo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar ruff
        run: pip install ruff

      - name: Lint
        run: ruff check app tests scripts
