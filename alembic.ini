# ============================================================================
# Alembic — Configuración de migraciones para DenunciaBot
# ----------------------------------------------------------------------------
# La URL de la base de datos NO se define aquí: se lee desde app.config
# (variable DATABASE_URL del .env) directamente en alembic/env.py.
# Esto evita duplicar configuración y mantiene los secretos fuera del .ini.
# ============================================================================

[alembic]
# Ubicación de los scripts
script_location = alembic

# Permite importar el paquete `app` desde dentro de env.py
prepend_sys_path = .

# Formato del nombre de archivo de nuevas revisiones
# Ej: 2026_05_11_2200-abc123def456_descripcion.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timestamp en UTC
timezone = UTC

# La URL la inyecta env.py — DEJAR VACÍO
sqlalchemy.url =


# ============================================================================
# Logging
# ============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
